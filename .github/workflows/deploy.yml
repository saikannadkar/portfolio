name: Test & Deploy Portfolio

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript
        run: node --check main.js

      - name: Run portfolio tests
        run: node .github/tests/test.html.js

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /tmp
            rm -rf portfolio_temp
            git clone --depth 1 https://github.com/saikannadkar/portfolio.git portfolio_temp
            sudo cp /tmp/portfolio_temp/index.html /var/www/portfolio/index.html
            sudo cp /tmp/portfolio_temp/style.css /var/www/portfolio/style.css
            sudo cp /tmp/portfolio_temp/main.js /var/www/portfolio/main.js
            sudo chown www-data:www-data /var/www/portfolio/index.html /var/www/portfolio/style.css /var/www/portfolio/main.js
            rm -rf /tmp/portfolio_temp
            echo "Deployed successfully"
