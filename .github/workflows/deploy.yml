name: Test & Deploy Portfolio

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript
        run: node --check main.js

      - name: Run portfolio tests
        run: node .github/tests/test.html.js

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -e
            export PATH=$PATH:/usr/bin:/usr/local/bin
            echo "Starting deploy..."
            cd /tmp
            rm -rf portfolio_temp
            git clone --depth 1 https://github.com/saikannadkar/portfolio.git portfolio_temp
            echo "Clone successful, files:"
            ls /tmp/portfolio_temp/
            sudo rsync -a --delete --exclude='.git' --exclude='.github' /tmp/portfolio_temp/ /var/www/portfolio/
            sudo chown -R www-data:www-data /var/www/portfolio/
            rm -rf /tmp/portfolio_temp
            echo "Deployed successfully"
