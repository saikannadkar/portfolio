name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /tmp
            git clone https://github.com/saikannadkar/portfolio.git portfolio_temp 2>/dev/null || \
            (cd portfolio_temp && git pull)
            sudo cp /tmp/portfolio_temp/index.html /var/www/portfolio/index.html
            sudo chown www-data:www-data /var/www/portfolio/index.html
            rm -rf /tmp/portfolio_temp
            echo "Deployed successfully"
